<!doctype html>
<html>
  <head>
    <title>Edge Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      /* ─────────────────────────────────────────────
         DESIGN TOKENS — edit these to restyle the app
         ───────────────────────────────────────────── */
      :root {
        /* Colors */
        --color-bg: #07000b;
        --color-text: #ff3b3b;
        --color-accent: #ff0000;
        --color-accent-muted: #ff4d4d;
        --color-surface: #1a0000;
        --color-surface-hover: #330000;
        --color-surface-dark: #111;
        --color-white: #ffffff;

        /* Pause / resume state colors */
        --color-pause-surface: #001a00;
        --color-pause-text: #4dff4d;
        --color-pause-border: #00ff00;

        /* Progress bar */
        --color-progress-track: #111;
        --color-progress-fill: #ff4d4d;

        /* Border */
        --color-border: #ff0000;

        /* Typography */
        --font-family: sans-serif;
        --font-size-xs: 14px;
        --font-size-sm: 18px;
        --font-size-md: 20px;
        --font-size-lg: 26px;
        --font-size-xl: 28px;

        /* Spacing */
        --spacing-xs: 6px;
        --spacing-sm: 10px;
        --spacing-md: 14px;
        --spacing-lg: 15px;

        /* Shape */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 12px;

        /* Border width */
        --border-width: 2px;
        --border-width-thin: 1px;

        /* Progress bar */
        --progress-height: 26px;
        --progress-text-size: 14px;

        /* Layout */
        --container-max-width: 420px;
        --transition-progress: width 0.1s linear;
      }

      /* ─────────────────────────────────────────────
         BASE
         ───────────────────────────────────────────── */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: var(--font-family);
        background: var(--color-bg);
        color: var(--color-text);
        padding: 20px;
      }

      #config input ::-webkit-outer-spin-button,
      #config input ::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* Firefox */
      #config input {
        appearance: textfield;
      }

      /* ─────────────────────────────────────────────
         BUTTONS — shared base
         ───────────────────────────────────────────── */
      button {
        display: block;
        width: 100%;
        font-size: var(--font-size-sm);
        padding: var(--spacing-md);
        margin: var(--spacing-sm) 0;
        background: var(--color-surface);
        color: var(--color-accent-muted);
        border: var(--border-width) solid var(--color-border);
        border-radius: var(--radius-md);
        cursor: pointer;
      }

      button:active {
        background: var(--color-surface-hover);
      }

      button:disabled {
        filter: grayscale(80%) saturate(0.5) opacity(0.6);
      }

      /* ─────────────────────────────────────────────
         FIXED CORNER BUTTONS
         ───────────────────────────────────────────── */
      .configToggle {
        position: fixed;
        top: var(--spacing-sm);
        left: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: var(--font-size-xs);
        z-index: 10;
        width: fit-content;
      }

      .pauseBtn {
        position: fixed;
        top: 54px;
        left: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: var(--font-size-xs);
        z-index: 10;
        width: fit-content;
        /* inherits base button styles */
      }

      .pauseBtn.paused {
        background: var(--color-pause-surface);
        color: var(--color-pause-text);
        border-color: var(--color-pause-border);
      }

      .restartBtn {
        position: fixed;
        top: var(--spacing-sm);
        right: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: var(--font-size-xs);
        z-index: 10;
        width: fit-content;
      }

      /* ─────────────────────────────────────────────
         LAYOUT
         ───────────────────────────────────────────── */
      .container {
        text-align: center;
        width: 100%;
        max-width: var(--container-max-width);
      }

      /* ─────────────────────────────────────────────
         CONFIG PANEL
         ───────────────────────────────────────────── */
      #config {
        display: none;
        margin-top: var(--spacing-lg);
        width: 100%;
        max-width: var(--container-max-width);
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        gap: var(--spacing-sm);
        align-items: center;
      }

      #config label {
        font-size: var(--font-size-xs);
        text-align: right;
      }

      #config input {
        width: 100%;
        padding: 8px;
        background: var(--color-surface-dark);
        color: var(--color-accent-muted);
        border: var(--border-width-thin) solid var(--color-border);
        border-radius: var(--radius-sm);
        font-size: var(--font-size-xs);
      }

      /* ─────────────────────────────────────────────
         STATE & COUNTERS
         ───────────────────────────────────────────── */
      #state {
        font-size: var(--font-size-xl);
        font-weight: bold;
        margin-bottom: var(--spacing-sm);
        color: var(--color-accent);
      }

      #output {
        font-size: var(--font-size-md);
        margin-top: var(--spacing-sm);
      }

      #count {
        font-size: var(--font-size-lg);
        margin-top: var(--spacing-sm);
        font-weight: bold;
        color: var(--color-accent);
      }

      /* ─────────────────────────────────────────────
         PROGRESS BAR
         ───────────────────────────────────────────── */
      #progressContainer {
        width: 100%;
        height: var(--progress-height);
        background: var(--color-progress-track);
        border: var(--border-width-thin) solid var(--color-border);
        border-radius: var(--radius-lg);
        margin-top: var(--spacing-lg);
        overflow: hidden;
        position: relative;
      }

      #progressBar {
        height: 100%;
        width: 0%;
        background: var(--color-progress-fill);
        border-radius: var(--radius-lg) 0 0 var(--radius-lg);
        transition: var(--transition-progress);
      }

      #progressText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: var(--progress-text-size);
        font-weight: bold;
        color: var(--color-white);
        pointer-events: none;
      }

      /* ─────────────────────────────────────────────
         RESPONSIVE
         ───────────────────────────────────────────── */
      /* @media (max-width: 600px) {
        #config {
          grid-template-columns: 1fr 1fr;
        }
        #config button {
          grid-column: span 2;
        }
      }

      @media (max-width: 380px) {
        #config {
          grid-template-columns: 1fr;
        }
        #config button {
          grid-column: span 1;
        }
      } */
    </style>
  </head>

  <body>
    <button class="configToggle" onclick="toggleConfig()">Config</button>
    <button id="pauseBtn" class="pauseBtn" onclick="togglePause()" disabled>
      Pause
    </button>
    <button class="restartBtn" onclick="restartSession()">Restart</button>

    <div id="config">
      <label>Edge Until</label>
      <label>Min</label>
      <input id="untilMin" type="number" value="2" />

      <label>Max</label>
      <input id="untilMax" type="number" value="6" />

      <label>Edge Duration</label>
      <label>Min</label>

      <input id="durMin" type="number" value="2" />

      <label>Max</label>
      <input id="durMax" type="number" value="8" />

      <label>Rest Duration</label>
      <label>Min</label>

      <input id="restMin" type="number" value="30" />

      <label>Max</label>
      <input id="restMax" type="number" value="90" />

      <label>Total Edges</label>
      <input id="totalEdges" type="number" value="5" />

      <button style="grid-column: span 5" onclick="randomizeAll()">
        Randomize Parameters
      </button>
    </div>

    <div class="container" id="main">
      <div id="state">Idle</div>

      <button id="startButton" onclick="handleButton()">Start Session</button>

      <p id="output"></p>

      <p id="count">Edges Left: 0</p>

      <div id="progressContainer">
        <div id="progressBar"></div>
        <div id="progressText">00:00</div>
      </div>
    </div>

    <script>
      // ─────────────────────────────────────────────────────────────────────
      // RANDOMIZATION BOUNDS
      // These define the min/max ranges used when "Randomize Parameters" is
      // clicked. Adjust these to change the pool of possible random values.
      // ─────────────────────────────────────────────────────────────────────

      // "Edge Until" — how many minutes to build up before edging (minutes)
      const RAND_UNTIL_MIN_LO = 1; // lowest possible untilMin
      const RAND_UNTIL_MIN_HI = 2; // highest possible untilMin
      const RAND_UNTIL_MAX_PAD_LO = 2; // untilMax is at least untilMin + this
      const RAND_UNTIL_MAX_PAD_HI = 5; // untilMax is at most untilMin + this

      // "Edge Duration" — how long to hold the edge (minutes)
      const RAND_DUR_MIN_LO = 1;
      const RAND_DUR_MIN_HI = 3;
      const RAND_DUR_MAX_PAD_LO = 1;
      const RAND_DUR_MAX_PAD_HI = 10;

      // "Rest Duration" — cool-down between edges (seconds)
      const RAND_REST_MIN_LO = 10;
      const RAND_REST_MIN_HI = 25;
      const RAND_REST_MAX_PAD_LO = 10;
      const RAND_REST_MAX_PAD_HI = 40;

      // Total number of edges in a randomized session
      const RAND_EDGES_LO = 5;
      const RAND_EDGES_HI = 12;

      // ─────────────────────────────────────────────────────────────────────
      // DEFAULT INPUT VALUES (mirrors the HTML value="" attributes)
      // ─────────────────────────────────────────────────────────────────────
      const DEFAULT_UNTIL_MIN = 1;
      const DEFAULT_UNTIL_MAX = 5;
      const DEFAULT_DUR_MIN = 2;
      const DEFAULT_DUR_MAX = 8;
      const DEFAULT_REST_MIN = 30;
      const DEFAULT_REST_MAX = 90;
      const DEFAULT_TOTAL_EDGES = 5;

      // ─────────────────────────────────────────────────────────────────────
      // RUNTIME STATE
      // ─────────────────────────────────────────────────────────────────────
      let edgesLeft = DEFAULT_TOTAL_EDGES;
      let timerInterval = null;
      let currentState = null;

      let preEdgeTimerEndTime = null;
      let edgeDelaySec = 0;

      const startBtn = document.getElementById("startButton");
      const stateLabel = document.getElementById("state");
      const progressText = document.getElementById("progressText");
      const configBtn = document.querySelector(".configToggle");
      const configPanel = document.getElementById("config");
      const pauseBtn = document.getElementById("pauseBtn");
      const mainContainer = document.getElementById("main");

      let isPaused = false;
      let pausedRemainingSec = 0;
      let pausedOnComplete = null;

      // ─────────────────────────────────────────────────────────────────────
      // HELPERS
      // ─────────────────────────────────────────────────────────────────────
      function setState(name) {
        stateLabel.textContent = name;
      }

      function rand(min, max) {
        min = Number(min);
        max = Number(max);
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function toggleConfig() {
        configPanel.style.display =
          configPanel.style.display === "grid" ? "none" : "grid";
        if (configPanel.style.display === "grid")
          mainContainer.style.display = "none";
        else mainContainer.style.display = "block";
      }

      function randomizeAll() {
        const untilMin = rand(RAND_UNTIL_MIN_LO, RAND_UNTIL_MIN_HI);
        const untilMax = rand(
          untilMin + RAND_UNTIL_MAX_PAD_LO,
          untilMin + RAND_UNTIL_MAX_PAD_HI,
        );
        const durMin = rand(RAND_DUR_MIN_LO, RAND_DUR_MIN_HI);
        const durMax = rand(
          durMin + RAND_DUR_MAX_PAD_LO,
          durMin + RAND_DUR_MAX_PAD_HI,
        );
        const restMin = rand(RAND_REST_MIN_LO, RAND_REST_MIN_HI);
        const restMax = rand(
          restMin + RAND_REST_MAX_PAD_LO,
          restMin + RAND_REST_MAX_PAD_HI,
        );
        const totalEdgesRandom = rand(RAND_EDGES_LO, RAND_EDGES_HI);

        document.getElementById("untilMin").value = untilMin;
        document.getElementById("untilMax").value = untilMax;
        document.getElementById("durMin").value = durMin;
        document.getElementById("durMax").value = durMax;
        document.getElementById("restMin").value = restMin;
        document.getElementById("restMax").value = restMax;
        document.getElementById("totalEdges").value = totalEdgesRandom;

        edgesLeft = totalEdgesRandom;
        document.getElementById("count").textContent =
          "Edges Left: " + edgesLeft;
        currentState = null;
        setState("Idle");
        resetProgress();
        startBtn.textContent = "Start Session";
        preEdgeTimerEndTime = null;
        edgeDelaySec = 0;
      }

      // ─────────────────────────────────────────────────────────────────────
      // PAUSE / RESUME
      // ─────────────────────────────────────────────────────────────────────
      function togglePause() {
        if (!isPaused) {
          isPaused = true;
          clearInterval(timerInterval);
          const parts = progressText.textContent.split(":").map(Number);
          pausedRemainingSec = parts[0] * 60 + parts[1];
          pauseBtn.textContent = "Resume";
          pauseBtn.classList.add("paused");
          startBtn.disabled = true;
          document.querySelector(".restartBtn").disabled = true;
          setState("Paused");
        } else {
          isPaused = false;
          pauseBtn.textContent = "Pause";
          pauseBtn.classList.remove("paused");
          startBtn.disabled = currentState === "Edging";
          document.querySelector(".restartBtn").disabled = false;
          setState(currentState);
          startProgress(pausedRemainingSec, pausedOnComplete);
        }
      }

      // ─────────────────────────────────────────────────────────────────────
      // SESSION CONTROL
      // ─────────────────────────────────────────────────────────────────────
      function handleButton() {
        if (currentState === "Finished" || edgesLeft <= 0) {
          restartSession();
        } else {
          nextState();
        }
      }

      function restartSession() {
        startBtn.disabled = false;
        configBtn.disabled = false;
        configPanel.style.display = "none";
        mainContainer.style.display = "block"
        pauseBtn.disabled = true;
        pauseBtn.textContent = "Pause";
        pauseBtn.classList.remove("paused");
        isPaused = false;
        pausedRemainingSec = 0;
        pausedOnComplete = null;
        edgesLeft = Number(document.getElementById("totalEdges").value);
        currentState = null;
        setState("Idle");

        document.getElementById("count").textContent =
          "Edges Left: " + edgesLeft;
        document.getElementById("output").textContent = "";

        resetProgress();
        startBtn.textContent = "Start Session";
        preEdgeTimerEndTime = null;
        edgeDelaySec = 0;
      }

      async function nextState() {
        startBtn.disabled = false;

        if (edgesLeft <= 0) {
          document.getElementById("output").textContent = "Finished!";
          startBtn.textContent = "Restart Session";
          currentState = "Finished";
          setState("Finished");
          resetProgress();
          pauseBtn.disabled = true;
          pauseBtn.textContent = "Pause";
          pauseBtn.classList.remove("paused");
          return;
        }

        if (currentState === "Resting" || currentState === null) {
          // ── PRE-EDGE ──────────────────────────────────────────────────────
          if (currentState === null) {
            configBtn.disabled = true;
            configPanel.style.display = "none";
            pauseBtn.disabled = false;
          }
          currentState = "Pre-Edge";
          setState("Pre-Edge");
          preEdgeTimerEndTime = null;
          edgeDelaySec = 0;

          const duration = rand(
            document.getElementById("untilMin").value,
            document.getElementById("untilMax").value,
          );

          document.getElementById("output").textContent =
            "Edge! you only have " + duration + " min";
          startBtn.textContent = "Edge";

          startProgress(duration * 60, () => {
            preEdgeTimerEndTime = Date.now();
          });
        } else if (currentState === "Pre-Edge") {
          // ── EDGING ────────────────────────────────────────────────────────
          currentState = "Edging";
          setState("Edging");

          edgeDelaySec =
            preEdgeTimerEndTime !== null
              ? (Date.now() - preEdgeTimerEndTime) / 1000
              : 0;

          edgesLeft--;
          document.getElementById("count").textContent =
            "Edges Left: " + edgesLeft;

          const baseDuration = rand(
            document.getElementById("durMin").value,
            document.getElementById("durMax").value,
          );
          const edgingDuration = baseDuration * 60 + edgeDelaySec;

          document.getElementById("output").textContent =
            "Stay at the edge for " +
            baseDuration +
            " min" +
            (edgeDelaySec > 0
              ? " (+" + edgeDelaySec.toFixed(1) + "s delay added)"
              : "");

          startBtn.textContent = "Stay.";
          startBtn.disabled = true;
          startProgress(edgingDuration);
        } else if (currentState === "Edging") {
          // ── RESTING ───────────────────────────────────────────────────────
          currentState = "Resting";
          setState("Resting");

          const baseDuration = rand(
            document.getElementById("restMin").value,
            document.getElementById("restMax").value,
          );
          const restDuration = Math.max(0, baseDuration - edgeDelaySec);

          document.getElementById("output").textContent =
            "Rest for " +
            restDuration.toFixed(1) +
            " sec" +
            (edgeDelaySec > 0
              ? " (-" + edgeDelaySec.toFixed(1) + "s delay removed)"
              : "");

          startBtn.textContent = "Resting";
          startProgress(restDuration);
        }
      }

      // ─────────────────────────────────────────────────────────────────────
      // PROGRESS BAR
      // ─────────────────────────────────────────────────────────────────────
      function formatTime(sec) {
        sec = Math.ceil(sec);
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
      }

      function startProgress(seconds, onComplete) {
        resetProgress();
        pausedOnComplete = onComplete || null;

        const progressBar = document.getElementById("progressBar");
        const startTime = Date.now();
        const totalMs = seconds * 1000;

        timerInterval = setInterval(() => {
          const elapsedMs = Date.now() - startTime;
          const remaining = (totalMs - elapsedMs) / 1000;

          const percent = Math.min((elapsedMs / totalMs) * 100, 100);
          progressBar.style.width = percent + "%";
          progressText.textContent = formatTime(Math.max(0, remaining));

          if (elapsedMs >= totalMs) {
            clearInterval(timerInterval);
            if (onComplete) onComplete();
            if (currentState !== "Pre-Edge") nextState();
          }
        }, 100);
      }

      function resetProgress() {
        clearInterval(timerInterval);
        document.getElementById("progressBar").style.width = "0%";
        progressText.textContent = "00:00";
      }

      // ─────────────────────────────────────────────────────────────────────
      // INIT
      // ─────────────────────────────────────────────────────────────────────
      document.getElementById("count").textContent = "Edges Left: " + edgesLeft;
    </script>
  </body>
</html>
