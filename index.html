<!doctype html>
<html>
<head>
<title>Edge Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box}

body{
margin:0;
min-height:100dvh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:#0b0b0b;
color:#ff3b3b;
padding:20px;
}

.container{
text-align:center;
width:100%;
max-width:420px;
}

.configToggle{
position:fixed;
top:10px;
left:10px;
padding:10px 14px;
font-size:14px;
z-index:10;
width:fit-content;
}

.restartBtn{
position:fixed;
top:10px;
right:10px;
padding:10px 14px;
font-size:14px;
z-index:10;
background:#1a0000;
color:#ff4d4d;
border:2px solid #ff0000;
border-radius:10px;
cursor:pointer;
width:fit-content;
}

button{
display:block;
width:100%;
font-size:18px;
padding:14px;
margin:10px 0;
background:#1a0000;
color:#ff4d4d;
border:2px solid #ff0000;
border-radius:10px;
cursor:pointer;
}

button:active{
background:#330000;
}

#state{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
color:#ff0000;
}

#config{
display:none;
margin-top:15px;
width:100%;
max-width:420px;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:10px;
align-items:center;
}

#config label{
font-size:14px;
}

#config input{
width:100%;
padding:8px;
background:#111;
color:#ff4d4d;
border:1px solid #ff0000;
border-radius:6px;
font-size:14px;
}

#output{
font-size:20px;
margin-top:10px;
}

#count{
font-size:26px;
margin-top:10px;
font-weight:bold;
color:#ff0000;
}

#progressContainer{
width:100%;
height:22px;
background:#111;
border:1px solid #ff0000;
border-radius:12px;
margin-top:15px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:#ff4d4d;
border-radius:12px 0 0 12px;
transition:width 0.1s linear;
}

@media (max-width:600px){
#config{
grid-template-columns:1fr 1fr;
}
#config button{
grid-column:span 2;
}
}

@media (max-width:380px){
#config{
grid-template-columns:1fr;
}
#config button{
grid-column:span 1;
}
}

</style>
</head>

<body>

<button class="configToggle" onclick="toggleConfig()">Config</button>
<button class="restartBtn" onclick="restartSession()">Restart</button>

<div id="config">

<label>Edge Until Min</label>
<input id="untilMin" type="number" value="2">

<label>Max</label>
<input id="untilMax" type="number" value="6">

<label>Edge Duration Min</label>
<input id="durMin" type="number" value="2">

<label>Max</label>
<input id="durMax" type="number" value="8">

<label>Rest Duration Min</label>
<input id="restMin" type="number" value="30">

<label>Max</label>
<input id="restMax" type="number" value="90">

<label>Total Edges</label>
<input id="totalEdges" type="number" value="5">

<button style="grid-column:span 4" onclick="randomizeAll()">
Randomize Parameters
</button>

</div>

<div class="container">

<div id="state">Idle</div>

<button id="startButton" onclick="handleButton()">Start Session</button>

<p id="output"></p>

<p id="count">Edges Left: 0</p>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

</div>

<script>

let edgesLeft = Number(document.getElementById("totalEdges").value)
let timerInterval = null
let currentState = null

const startBtn = document.getElementById("startButton")
const stateLabel = document.getElementById("state")

function setState(name){
stateLabel.textContent=name
}

function rand(min,max){
min=Number(min)
max=Number(max)
return Math.floor(Math.random()*(max-min+1))+min
}

function toggleConfig(){
const cfg=document.getElementById("config")
cfg.style.display = cfg.style.display==="grid" ? "none" : "grid"
}

function randomizeAll(){

const untilMin=rand(2,5)
const untilMax=rand(untilMin+2,10)
const durMin=rand(1,4)
const durMax=rand(durMin+2,12)
const restMin=rand(10,30)
const restMax=rand(restMin+10,120)
const totalEdgesRandom=rand(3,10)

document.getElementById("untilMin").value=untilMin
document.getElementById("untilMax").value=untilMax
document.getElementById("durMin").value=durMin
document.getElementById("durMax").value=durMax
document.getElementById("restMin").value=restMin
document.getElementById("restMax").value=restMax
document.getElementById("totalEdges").value=totalEdgesRandom

edgesLeft=totalEdgesRandom
document.getElementById("count").textContent="Edges Left: "+edgesLeft
currentState=null
setState("Idle")
resetProgress()
startBtn.textContent="Start Session"

}

function handleButton(){
if(currentState==="Finished"||edgesLeft<=0){
restartSession()
}else{
nextState()
}
}

function restartSession(){

edgesLeft=Number(document.getElementById("totalEdges").value)
currentState=null
setState("Idle")

document.getElementById("count").textContent="Edges Left: "+edgesLeft
document.getElementById("output").textContent=""

resetProgress()
startBtn.textContent="Start Session"

}

function nextState(){

if(edgesLeft<=0){

document.getElementById("output").textContent="Finished!"
startBtn.textContent="Restart Session"
currentState="Finished"
setState("Finished")
resetProgress()
return

}

if(currentState==="Resting"||currentState===null){

currentState="Pre-Edge"
setState("Pre-Edge")

const duration=rand(
document.getElementById("untilMin").value,
document.getElementById("untilMax").value
)

document.getElementById("output").textContent="Get ready for "+duration+" min"
startBtn.textContent="Pre-Edge"

startProgress(duration*60)

}
else if(currentState==="Pre-Edge"){

currentState="Edging"
setState("Edging")

const duration=rand(
document.getElementById("durMin").value,
document.getElementById("durMax").value
)

edgesLeft--

document.getElementById("count").textContent="Edges Left: "+edgesLeft
document.getElementById("output").textContent="Edging for "+duration+" min"

startBtn.textContent="Edging"

startProgress(duration*60)

}
else if(currentState==="Edging"){

currentState="Resting"
setState("Resting")

const duration=rand(
document.getElementById("restMin").value,
document.getElementById("restMax").value
)

document.getElementById("output").textContent="Resting for "+duration+" sec"
startBtn.textContent="Resting"

startProgress(duration)

}

}

function startProgress(seconds){

resetProgress()

const progressBar=document.getElementById("progressBar")
const startTime=Date.now()
const totalMs=seconds*1000

timerInterval=setInterval(()=>{

const elapsedMs=Date.now()-startTime
const percent=Math.min((elapsedMs/totalMs)*100,100)

progressBar.style.width=percent+"%"

if(elapsedMs>=totalMs){

clearInterval(timerInterval)

if(currentState!=="Pre-Edge"){
nextState()
}

}

},100)

}

function resetProgress(){
clearInterval(timerInterval)
document.getElementById("progressBar").style.width="0%"
}

document.getElementById("count").textContent="Edges Left: "+edgesLeft

</script>

</body>
</html>
